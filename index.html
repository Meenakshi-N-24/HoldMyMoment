<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HoldMyMoment</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="scene">

  <!-- Moon -->
  <div id="moon"></div>

  <!-- Stars -->
  <div class="star s1"></div>
  <div class="star s2"></div>
  <div class="star s3"></div>
  <div class="star s4"></div>
  <div class="star s5"></div>
  <div class="star s6"></div>
<div class="star s7"></div>
<div class="star s8"></div>
<div class="star s9"></div>
<div class="star s10"></div>

<div id="road">
  <div class="road-shade left"></div>
  <div class="road-shade right"></div>
</div>

<!-- Grass -->

<div class="grass g1"><span></span></div>
<div class="grass g2"><span></span></div>
<div class="grass g3"><span></span></div>
<div class="grass g4"><span></span></div>
<div class="grass g5"><span></span></div>
<div class="grass g6"><span></span></div>
<div class="grass g7"><span></span></div>
<div class="grass g8"><span></span></div>
<div class="grass g9"><span></span></div>
<div class="grass g10"><span></span></div>
<div class="grass g11"><span></span></div>
<div class="grass g12"><span></span></div>
<div class="grass g13"><span></span></div>
<div class="grass g14"><span></span></div>
<div class="grass g15"><span></span></div>
<div class="grass g16"><span></span></div>

  <!-- Flower -->
  <div id="flower-side">
  <img src="Assets/flower.png" alt="flower">
</div>

<div id="held-flower">
  <img src="Assets/flower.png" alt="held flower">
</div>

  <!-- Giga Back View -->
  <div id="giga">
  <img id="giga-img" src="Assets/walk1.png" alt="Giga Noob">
</div>

  <!-- Hold Target -->
  <div id="target-ring"></div>

  <!-- Prompt -->
  <div id="prompt">Place your thumb here</div>

  <!-- Dialogue -->
  <div id="bubble"></div>

  <!-- GELATO STALL -->

<div id="gelato-stall">
  <img src="Assets/gelato-stall.png" alt="Gelato Stall">
</div>

<!-- HELD GELATO -->

<div id="held-gelato">
  <img src="Assets/gelato.png" alt="Held Gelato">
</div>

<!-- CLAW MACHINE -->

<div id="claw-machine">
  <img src="Assets/claw-mech.png" alt="Claw Machine">
</div>

<!-- HELD PLUSH -->

<div id="held-plush">
  <img src="Assets/plush.png" alt="Held Plush">
</div>

</div>
<script src="script.js"></script>
</body>
</html>
